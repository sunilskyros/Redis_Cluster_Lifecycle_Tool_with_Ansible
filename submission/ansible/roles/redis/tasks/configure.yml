- name: Ensure Redis group exists
  ansible.builtin.group:
    name: "{{ redis_group }}"
    system: true
  become: true

- name: Ensure Redis user exists
  ansible.builtin.user:
    name: "{{ redis_user }}"
    group: "{{ redis_group }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false
  become: true

- name: Ensure Redis directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ redis_config_dir }}", owner: root, group: root, mode: "0755" }
    - { path: "{{ redis_data_dir }}", owner: "{{ redis_user }}", group: "{{ redis_group }}", mode: "0755" }
    - { path: "{{ redis_log_dir }}", owner: "{{ redis_user }}", group: "{{ redis_group }}", mode: "0755" }
    - { path: "{{ redis_run_dir }}", owner: "{{ redis_user }}", group: "{{ redis_group }}", mode: "0755" }
  become: true

- name: Render Redis cluster configuration
  ansible.builtin.template:
    src: redis.conf.j2
    dest: "{{ redis_config_dir }}/redis.conf"
    owner: root
    group: root
    mode: "0644"
  become: true
