- name: Wait for Redis TCP port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ redis_port }}"
    timeout: 60

- name: Wait for Redis PING
  ansible.builtin.command: "{{ redis_current_symlink }}/bin/redis-cli -h 127.0.0.1 -p {{ redis_port }} PING"
  register: redis_ping
  retries: 30
  delay: 1
  until: redis_ping.stdout is search("PONG")
  changed_when: false
