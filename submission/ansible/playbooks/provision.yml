- name: Validate requested cluster shape
  hosts: localhost
  gather_facts: false
  vars_files:
    - "../group_vars/all.yml"
  tasks:
    - name: Assert inventory node count matches masters and replicas
      ansible.builtin.assert:
        that:
          - groups['redis_nodes'] | length == (cluster_masters_count | int) * ((replicas_per_master | int) + 1)
        fail_msg: >-
          Inventory has {{ groups['redis_nodes'] | length }} nodes, but requested
          {{ cluster_masters_count }} masters with {{ replicas_per_master }} replica(s) per master.

- name: Install and start Redis on every node
  hosts: redis_nodes
  gather_facts: true
  become: true
  vars_files:
    - "../group_vars/all.yml"
  roles:
    - redis

- name: Form Redis Cluster and print topology
  hosts: localhost
  gather_facts: false
  vars_files:
    - "../group_vars/all.yml"
  vars:
    first_node: "{{ groups['redis_nodes'][0] }}"
    first_ip: "{{ hostvars[first_node].redis_cluster_ip }}"
  tasks:
    - name: Build Redis Cluster address list
      ansible.builtin.set_fact:
        cluster_addresses: "{{ (cluster_addresses | default([])) + [hostvars[item].redis_cluster_ip ~ ':' ~ (hostvars[item].redis_port | default(redis_port) | string)] }}"
      loop: "{{ groups['redis_nodes'] }}"

    - name: Check current cluster state
      ansible.builtin.command: "{{ redis_current_symlink }}/bin/redis-cli -h {{ first_ip }} -p {{ redis_port }} CLUSTER INFO"
      delegate_to: "{{ first_node }}"
      register: cluster_info_before
      failed_when: false
      changed_when: false

    - name: Create Redis Cluster when it is not already healthy
      ansible.builtin.shell: |
        set -euo pipefail
        echo "yes" | {{ redis_current_symlink }}/bin/redis-cli --cluster create {{ cluster_addresses | join(' ') }} --cluster-replicas {{ replicas_per_master | int }}
      args:
        executable: /bin/bash
      delegate_to: "{{ first_node }}"
      register: cluster_create
      when: "'cluster_state:ok' not in cluster_info_before.stdout"

    - name: Wait for cluster_state:ok
      ansible.builtin.command: "{{ redis_current_symlink }}/bin/redis-cli -h {{ first_ip }} -p {{ redis_port }} CLUSTER INFO"
      delegate_to: "{{ first_node }}"
      register: cluster_info_after
      retries: 30
      delay: 2
      until: "'cluster_state:ok' in cluster_info_after.stdout"
      changed_when: false

    - name: Print final cluster topology
      ansible.builtin.command: "{{ redis_current_symlink }}/bin/redis-cli -h {{ first_ip }} -p {{ redis_port }} CLUSTER NODES"
      delegate_to: "{{ first_node }}"
      register: cluster_nodes
      changed_when: false

    - name: Cluster topology
      ansible.builtin.debug:
        msg: "{{ cluster_nodes.stdout_lines }}"
