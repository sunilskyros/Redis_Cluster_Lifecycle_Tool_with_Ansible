- name: Ensure all Redis nodes are started
  hosts: redis_nodes
  gather_facts: false
  become: true
  vars_files:
    - "../group_vars/all.yml"
  tasks:
    - name: Check whether Redis is already responding
      ansible.builtin.command: "{{ redis_current_symlink }}/bin/redis-cli -h 127.0.0.1 -p {{ redis_port }} PING"
      register: redis_ping
      failed_when: false
      changed_when: false

    - name: Clean database files if stopped during rollback
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ redis_data_dir }}/dump.rdb"
        - "{{ redis_data_dir }}/appendonlydir"
      when:
        - redis_ping.rc != 0
        - redis_clean_db | default(false) | bool

    - name: Start Redis daemon if stopped
      ansible.builtin.command: "{{ redis_current_symlink }}/bin/redis-server {{ redis_config_dir }}/redis.conf"
      become_user: "{{ redis_user }}"
      when: redis_ping.rc != 0
      changed_when: true
